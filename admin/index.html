<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — Studio Campa</title>
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
  /* ==========================================================
     PANNELLO — DESIGN B "COMPATTO INLINE"
     ========================================================== */

  body, [class*="Workflow"], [class*="EditorContainer"], [class*="EntryEditor"] {
    background:#fafaf8 !important;
    font-family:"Inter", system-ui, -apple-system, sans-serif !important;
  }

  /* Field labels (ovunque) */
  label, [class*="FieldLabel"], [class*="ControlLabel"] {
    font-family:"Inter", system-ui, sans-serif !important;
    font-size:12px !important;
    font-weight:500 !important;
    color:#1a1714 !important;
    margin:0 0 3px 0 !important;
    letter-spacing:0 !important;
    text-transform:none !important;
  }

  /* Hint text sotto i campi */
  [class*="ControlHint"], [class*="HintText"], [class*="FieldHint"] {
    font-size:11.5px !important;
    color:#8a8580 !important;
    font-style:normal !important;
    font-weight:400 !important;
    line-height:1.4 !important;
    margin:0 0 7px 0 !important;
    padding:0 !important;
    background:transparent !important;
    border:0 !important;
    letter-spacing:0 !important;
  }

  /* Hint dei top-level (object headers) — più visibile */
  [class*="ObjectControl"] > [class*="Hint"],
  [class*="ObjectFieldWrapper"] > [class*="Hint"] {
    padding:6px 12px !important;
    border-left:2px solid #ff8a5c !important;
    background:#fff7f1 !important;
    border-radius:0 6px 6px 0 !important;
    margin:6px 0 14px !important;
  }

  /* Input / textarea / select */
  input[type="text"], input[type="number"], input[type="email"], input[type="url"], input[type="tel"],
  textarea, select {
    border:0.5px solid #d5d0c5 !important;
    border-radius:7px !important;
    background:#fff !important;
    font-size:13.5px !important;
    font-family:"Inter", system-ui, sans-serif !important;
    padding:9px 12px !important;
    color:#1a1714 !important;
    width:100% !important;
    transition:border-color .12s, box-shadow .12s !important;
  }
  input:focus, textarea:focus, select:focus {
    border-color:#e85d3c !important;
    box-shadow:0 0 0 3px rgba(232,93,60,.15) !important;
    outline:0 !important;
  }
  textarea { min-height:54px !important; resize:vertical !important; }

  /* OBJECTS (Impostazioni Generali, Menu, Footer) come card */
  [class*="ObjectControl"] > [class*="StyledObjectFieldWrapper"],
  [class*="CollapsedObjectControl"] {
    background:#fff !important;
    border:0.5px solid #e5e7eb !important;
    border-radius:8px !important;
    padding:14px 18px !important;
    margin-bottom:14px !important;
  }

  /* ==========================================================
     LISTA DELLE SEZIONI — la parte importante
     ========================================================== */

  /* Container che contiene tutte le list items delle sezioni */
  [class*="ListControl"] > [class*="ObjectControl"],
  [class*="ListControl"] > div > div:first-child {
    background:#fff !important;
    border:0.5px solid #e5e7eb !important;
    border-radius:8px !important;
    padding:0 !important;
    overflow:hidden !important;
  }

  /* Ogni list item — flat row, niente padding/border decorativi */
  [class*="StyledListItem"],
  [class*="ListItem-"],
  [data-rbd-draggable-id] {
    background:#fff !important;
    border:0 !important;
    border-bottom:0.5px solid #f0f0f0 !important;
    border-radius:0 !important;
    margin:0 !important;
    padding:0 !important;
    box-shadow:none !important;
    overflow:visible !important;
    transition:background .1s !important;
  }
  [class*="StyledListItem"]:last-child,
  [data-rbd-draggable-id]:last-child {
    border-bottom:0 !important;
  }
  [class*="StyledListItem"]:hover {
    background:#fafafa !important;
  }

  /* Top bar di ogni list item (riga cliccabile) */
  [class*="StyledListItemTopBar"],
  [class*="ListItemTopBar"] {
    background:transparent !important;
    padding:10px 16px !important;
    border:0 !important;
    display:flex !important;
    align-items:center !important;
    gap:12px !important;
    cursor:pointer !important;
  }

  /* Drag handle */
  [class*="dragHandle"], [class*="DragHandle"], [class*="draghandle"] {
    color:#c0c0c0 !important;
    cursor:grab !important;
    font-size:15px !important;
  }
  [class*="dragHandle"] svg, [class*="DragHandle"] svg {
    width:14px !important; height:14px !important;
  }

  /* X / remove button */
  button[class*="StyledRemove"], button[class*="Remove"], [class*="removeButton"] {
    color:#a0a0a0 !important;
    background:transparent !important;
    border:0 !important;
    padding:4px !important;
    transition:color .12s !important;
  }
  button[class*="StyledRemove"]:hover, button[class*="Remove"]:hover {
    color:#e85d3c !important;
  }

  /* CHEVRON — rendiamolo VISIBILE (era il problema) */
  [class*="StyledListItemTopBar"] svg,
  [class*="ListItemTopBar"] svg,
  [class*="collapseButton"] svg,
  [class*="ToggleButton"] svg {
    color:#888 !important;
    opacity:.85 !important;
    width:14px !important; height:14px !important;
  }
  [class*="StyledListItemTopBar"] svg:hover {
    color:#1a1714 !important;
    opacity:1 !important;
  }

  /* Label dentro la top bar → PILL */
  [class*="StyledListItemTopBar"] > label,
  [class*="ListItemTopBar"] > label,
  [class*="StyledListItemTopBar"] > [class*="Label"]:not([class*="ControlLabel"]):not([class*="FieldLabel"]) {
    display:inline-flex !important;
    align-items:center !important;
    gap:6px !important;
    padding:3px 9px !important;
    border-radius:6px !important;
    font-size:11.5px !important;
    font-weight:500 !important;
    text-transform:none !important;
    letter-spacing:0 !important;
    margin:0 !important;
    background:#f1efe8 !important;
    color:#444441 !important;
    line-height:1.4 !important;
    white-space:nowrap !important;
    flex-shrink:0 !important;
  }

  /* COLORI PER TIPO DI SEZIONE */
  [data-section-type="hero"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="hero"] [class*="ListItemTopBar"] > label {
    background:#fff5ed !important; color:#c44a2e !important;
  }
  [data-section-type="problem"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="problem"] [class*="ListItemTopBar"] > label {
    background:#fdecec !important; color:#a32d2d !important;
  }
  [data-section-type="about"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="about"] [class*="ListItemTopBar"] > label {
    background:#e1f5ee !important; color:#0f6e56 !important;
  }
  [data-section-type="value_card"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="value_card"] [class*="ListItemTopBar"] > label {
    background:#faeeda !important; color:#854f0b !important;
  }
  [data-section-type="method"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="method"] [class*="ListItemTopBar"] > label {
    background:#e6f1fb !important; color:#185fa5 !important;
  }
  [data-section-type="levels"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="levels"] [class*="ListItemTopBar"] > label {
    background:#eeedfe !important; color:#534ab7 !important;
  }
  [data-section-type="programs"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="programs"] [class*="ListItemTopBar"] > label {
    background:#eaf3de !important; color:#3b6d11 !important;
  }
  [data-section-type="audience"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="audience"] [class*="ListItemTopBar"] > label {
    background:#fbeaf0 !important; color:#993556 !important;
  }
  [data-section-type="stats"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="stats"] [class*="ListItemTopBar"] > label {
    background:#e1f5ee !important; color:#085041 !important;
  }
  [data-section-type="testimonials"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="testimonials"] [class*="ListItemTopBar"] > label {
    background:#faece7 !important; color:#993c1d !important;
  }
  [data-section-type="big_quote"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="big_quote"] [class*="ListItemTopBar"] > label {
    background:#d3d1c7 !important; color:#2c2c2a !important;
  }
  [data-section-type="features_card"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="features_card"] [class*="ListItemTopBar"] > label {
    background:#faeeda !important; color:#633806 !important;
  }
  [data-section-type="cta_form"] [class*="StyledListItemTopBar"] > label,
  [data-section-type="cta_form"] [class*="ListItemTopBar"] > label {
    background:#d85a30 !important; color:#fff !important;
  }

  /* Summary text dopo il pill */
  [class*="StyledListItemTopBar"] [class*="StyledSummary"],
  [class*="StyledListItemTopBar"] [class*="Summary"],
  [class*="ListItemTopBar"] [class*="Summary"] {
    font-size:13.5px !important;
    color:#3a3733 !important;
    font-weight:400 !important;
    margin:0 0 0 4px !important;
    overflow:hidden !important;
    text-overflow:ellipsis !important;
    white-space:nowrap !important;
    flex:1 !important;
    min-width:0 !important;
  }

  /* Stato ESPANSO — la top bar diventa intestazione */
  [class*="StyledListItem"]:has([class*="StyledObjectFieldWrapper"]) [class*="StyledListItemTopBar"],
  [class*="StyledListItem"]:has([class*="ObjectField"]) [class*="StyledListItemTopBar"] {
    background:#fff !important;
    border-bottom:0.5px solid #ece9e3 !important;
  }
  /* Body dell'espanso */
  [class*="StyledListItem"] > [class*="StyledObjectFieldWrapper"],
  [class*="StyledListItem"] [class*="ObjectControl"] > div:not([class*="TopBar"]) {
    background:#fafaf8 !important;
    padding:22px 24px !important;
  }

  /* ==========================================================
     BOTTONI
     ========================================================== */

  /* "Aggiungi sezione" — dashed sottile */
  [class*="AddButton"], button[class*="addLabel"], [class*="StyledDropdownButton"] {
    background:transparent !important;
    color:#5a554d !important;
    border:0.5px dashed #b0a896 !important;
    border-radius:6px !important;
    padding:6px 14px !important;
    font-size:12.5px !important;
    font-weight:500 !important;
    margin-top:8px !important;
    cursor:pointer !important;
    transition:all .12s !important;
  }
  [class*="AddButton"]:hover, button[class*="addLabel"]:hover {
    border-color:#e85d3c !important;
    border-style:solid !important;
    color:#e85d3c !important;
    background:#fff7f1 !important;
  }

  /* Save button in alto a destra */
  button[class*="ToolbarButton-saveButton"],
  [class*="SaveButton"],
  button[class*="primary"] {
    background:#1a1714 !important;
    color:#fff !important;
    border-radius:999px !important;
    font-weight:500 !important;
    padding:9px 20px !important;
    border:0 !important;
    font-size:13px !important;
    box-shadow:none !important;
    cursor:pointer !important;
    transition:background .12s !important;
  }
  button[class*="ToolbarButton-saveButton"]:hover,
  [class*="SaveButton"]:hover {
    background:#e85d3c !important;
  }

  /* Color widget */
  [class*="ColorControl"] {
    display:flex !important;
    align-items:center !important;
    gap:10px !important;
  }
  [class*="ColorControl"] > div:first-child,
  [class*="ColorSwatch"] {
    width:36px !important;
    height:36px !important;
    border-radius:8px !important;
    border:0.5px solid #d5d0c5 !important;
    cursor:pointer !important;
  }

  /* File/image preview compatta */
  [class*="ImageControl"] > div, [class*="FileControl"] > div {
    border:0.5px solid #d5d0c5 !important;
    border-radius:8px !important;
    padding:10px !important;
    background:#fff !important;
  }
  </style>
</head>
<body>

<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
/* ==========================================================
   HELPERS
   ========================================================== */
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function img(src, alt){
  if(!src) return '';
  return '<img src="' + esc(src) + '" alt="' + esc(alt||'') + '">';
}

/* ==========================================================
   COLOR OVERRIDE (usato nell'anteprima)
   ========================================================== */
function colorOverrideCss(colors){
  const def = {primary:'#e85d3c', accent:'#ffd43b', ink:'#0a0a0a', bg_soft:'#faf7f3'};
  const c = Object.assign({}, def, colors||{});
  const rules = [
    `--coral-deep:${c.primary}`,
    `--coral-1:${c.primary}`,
    `--coral-darker:${c.primary}`,
    `--yellow:${c.accent}`,
    `--ink:${c.ink}`,
    `--bg-soft:${c.bg_soft}`
  ];
  return `<style>:root{${rules.join(';')};}</style>`;
}

/* ==========================================================
   13 SECTION TEMPLATES (preview)
   ========================================================== */
const templates = {
  hero(s){
    return `
      <section class="hero" data-section="hero" data-section-label="Hero"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="hero-bg">${img(s.bg_image, 'Hero')}</div>
        ${s.watermark?`<div class="hero-watermark">${esc(s.watermark)}</div>`:''}
        <div class="container hero-content">
          <h1>
            ${s.headline_pre?`${esc(s.headline_pre)}<br>`:''}
            ${s.headline_main?`${esc(s.headline_main)} `:''}
            ${s.headline_accent?`<span class="accent">${esc(s.headline_accent)}</span>`:''}
          </h1>
          <p class="hero-sub">
            ${s.subtitle_em?`<span class="em">${esc(s.subtitle_em)}</span> `:''}
            ${s.subtitle?esc(s.subtitle):''}
          </p>
          ${s.cta_label?`<div class="hero-cta"><a href="#" class="btn btn-yellow btn-large">${esc(s.cta_label)}</a></div>`:''}
          ${(s.mission_label_strong||s.mission_figure)?`
            <div class="mission-card">
              <div class="mission-label"><strong>${esc(s.mission_label_strong||'')}</strong> ${esc(s.mission_label_text||'')}</div>
              <div class="mission-bar">
                <div class="mission-bar-fill" style="width:${Number(s.mission_percent)||0}%"></div>
                <div class="mission-bar-pct">${Number(s.mission_percent)||0}%</div>
              </div>
              <div class="mission-figure">${esc(s.mission_figure||'')}</div>
              <div class="mission-sub">${esc(s.mission_sub_a||'')} <span class="hl">${esc(s.mission_sub_b||'')}</span></div>
            </div>`:''}
        </div>
      </section>`;
  },
  problem(s){
    const intro = (s.intro_paragraphs||[]).map(p=>`<p>${esc(p)}</p>`).join('');
    const questions = (s.questions||[]).map(q=>`<strong>${esc(q)}</strong>`).join('<br>');
    const middle = (s.middle_paragraphs||[]).map(p=>`<p>${esc(p)}</p>`).join('');
    const quote = (s.quote_lines||[]).map(l=>`<p>${esc(l)}</p>`).join('');
    return `
      <section class="problem" data-section="problem" data-section-label="Problema"${s.id?` id="${esc(s.id)}"`:''}>
        ${s.watermark?`<div class="problem-watermark">${esc(s.watermark)}</div>`:''}
        <div class="container">
          <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
          <div class="problem-body">
            ${intro}
            ${questions?`<p>${questions}</p>`:''}
            ${middle}
            ${quote?`<div class="problem-quote">${quote}</div>`:''}
            ${s.final_line?`<p class="problem-final">${esc(s.final_line)}</p>`:''}
          </div>
        </div>
      </section>`;
  },
  about(s){
    const body = (s.body_paragraphs||[]).map(p=>`<p>${p}</p>`).join('');
    return `
      <section class="about" data-section="about" data-section-label="Chi è il dottore"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container about-grid">
          <div>
            <h2>${esc(s.title||'')}</h2>
            ${s.lead?`<p class="about-lead">${esc(s.lead)}</p>`:''}
          </div>
          ${s.photo?`<div class="about-photo">${img(s.photo,'Dr. Campa')}</div>`:''}
          <div class="about-body">
            ${body}
            ${s.callout?`<em class="callout">${esc(s.callout)}</em>`:''}
          </div>
        </div>
      </section>`;
  },
  value_card(s){
    const icons = {
      clock:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="20"/><path d="M32 18v14l8 4"/></svg>`,
      chart:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 50 L24 30 L36 38 L52 14"/><polyline points="40 14 52 14 52 26"/></svg>`,
      shield:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M32 8 L52 16 V32 C52 44 32 56 32 56 C32 56 12 44 12 32 V16 Z"/></svg>`
    };
    const items = (s.items||[]).map(it=>`
      <div class="value-item">
        <div class="value-icon">${icons[it.icon]||icons.clock}</div>
        <h4>${esc(it.title||'')}</h4>
        ${it.tag?`<span class="value-tag">${esc(it.tag)}</span>`:''}
      </div>`).join('');
    return `
      <section class="value-section" data-section="value_card" data-section-label="Card Valore"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="value-card">
            <h2>${esc(s.title||'')}</h2>
            <p class="lead">${esc(s.lead||'')} <strong>${esc(s.lead_strong||'')}</strong></p>
            <div class="value-grid">${items}</div>
            ${s.footnote?`<p class="value-footnote">${esc(s.footnote)} <strong>${esc(s.footnote_strong||'')}</strong></p>`:''}
          </div>
        </div>
      </section>`;
  },
  method(s){
    const cards = (s.cards||[]).map(c=>`
      <div class="method-card">
        <div class="method-photo">
          ${img(c.photo, c.title)}
          <div class="method-num">${esc(c.num||'')}</div>
        </div>
        <div class="method-body">
          <h3>${esc(c.title||'')}</h3>
          <p>${esc(c.body||'')}</p>
        </div>
      </div>`).join('');
    return `
      <section class="method" data-section="method" data-section-label="Metodo"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="method-head">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle_a||'')}<br><br>${esc(s.subtitle_b||'')} <strong>${esc(s.subtitle_strong||'')}</strong></p>
          </div>
          <div class="method-grid">${cards}</div>
        </div>
      </section>`;
  },
  levels(s){
    const items = (s.levels||[]).map(l=>`
      <div class="level">
        <div class="level-tag">${esc(l.tag||'')}</div>
        <h4>${esc(l.title||'')}</h4>
        <p>${esc(l.body||'')}</p>
      </div>`).join('');
    const labels = s.pyramid_labels||[];
    return `
      <section class="levels" data-section="levels" data-section-label="Piramide"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="levels-head">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          <div class="levels-grid">
            <div class="pyramid">
              <div class="tri tri-3"><span class="tri-label">${esc(labels[0]||'')}</span></div>
              <div class="tri tri-2"><span class="tri-label">${esc(labels[1]||'')}</span></div>
              <div class="tri tri-1"><span class="tri-label">${esc(labels[2]||'')}</span></div>
            </div>
            <div class="levels-list">${items}</div>
          </div>
        </div>
      </section>`;
  },
  programs(s){
    const cards = (s.cards||[]).map(c=>`
      <div class="program-card ${c.reverse?'reverse':''}">
        <div class="program-text">
          ${c.tag?`<div class="program-tag">${esc(c.tag)}</div>`:''}
          <h3>${esc(c.title||'')}</h3>
          ${c.subtitle?`<div class="program-subtitle">${esc(c.subtitle)}</div>`:''}
          <p>${esc(c.body||'')}</p>
          ${c.link_label?`<a href="#" class="program-link">${esc(c.link_label)}</a>`:''}
        </div>
        <div class="program-img">${img(c.photo, c.title)}</div>
      </div>`).join('');
    return `
      <section class="programs" data-section="programs" data-section-label="Programmi"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="programs-head">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          ${cards}
        </div>
      </section>`;
  },
  audience(s){
    const items = (s.items||[]).map(it=>`
      <div class="audience-item">
        <div class="audience-photo">${img(it.photo, it.title)}</div>
        <h4>${esc(it.title||'')}</h4>
        <p><strong>${esc(it.body_strong||'')}</strong> ${esc(it.body||'')}</p>
      </div>`).join('');
    return `
      <section data-section="audience" data-section-label="Audience"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="audience-head">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          <div class="audience-grid">${items}</div>
        </div>
      </section>`;
  },
  stats(s){
    const renderRow = (row)=>{
      if(!row||!row.length) return '';
      const cells = row.map(c=>`
        <div class="stat">
          ${c.pill?`<div class="pill">${esc(c.pill)}</div>`:''}
          <div class="num">${esc(c.num||'')}</div>
          <div class="lbl">${esc(c.label||'')}</div>
        </div>`).join('');
      return `<div class="stats-row">${cells}</div>`;
    };
    return `
      <section class="stats" data-section="stats" data-section-label="Statistiche"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="stats-head">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          ${renderRow(s.row_a)}
          ${renderRow(s.row_b)}
          ${s.footnote?`<p class="stats-foot">${esc(s.footnote)}</p>`:''}
        </div>
      </section>`;
  },
  testimonials(s){
    const items = (s.items||[]).map(t=>`
      <div class="test-card">
        <div class="test-stars">★★★★★</div>
        <p class="test-text"><strong>${esc(t.text_strong||'')}</strong> ${esc(t.text||'')}</p>
        <div class="test-author">
          <div class="test-avatar">${img(t.avatar, t.name)}</div>
          <div class="test-name">${esc(t.name||'')} <span class="verified">✓</span></div>
        </div>
      </div>`).join('');
    return `
      <section class="testimonials" data-section="testimonials" data-section-label="Testimonianze"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="test-head">
            <h2>${esc(s.title_a||'')} <span class="serif-italic">${esc(s.title_italic||'')}</span></h2>
          </div>
          <div class="test-grid">${items}</div>
        </div>
      </section>`;
  },
  big_quote(s){
    return `
      <section class="big-quote" data-section="big_quote" data-section-label="Grande citazione"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <p class="q">${esc(s.quote||'')}</p>
          <div class="who">
            ${s.author_photo?`<div class="av">${img(s.author_photo, s.author_name)}</div>`:''}
            <div class="n">${esc(s.author_name||'')}</div>
          </div>
        </div>
      </section>`;
  },
  features_card(s){
    const pills = (s.pills||[]).map(p=>{
      if(p.special){
        const t = (p.text||'').split(/\b(VIVERE|VIVI)\b/i);
        if(t.length===3){
          return `<div class="pill-item special">${esc(t[0])}<em>${esc(t[1])}</em>${esc(t[2])}</div>`;
        }
        return `<div class="pill-item special">${esc(p.text||'')}</div>`;
      }
      return `<div class="pill-item">${esc(p.text||'')}</div>`;
    }).join('');
    return `
      <section class="features-section" data-section="features_card" data-section-label="Caratteristiche"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="features-card">
            <h2>${esc(s.title||'')}</h2>
            <p class="lead">${esc(s.lead||'')}</p>
            <div class="feature-pills">${pills}</div>
          </div>
        </div>
      </section>`;
  },
  cta_form(s){
    const perks = (s.perks||[]).map(p=>`<li>${esc(p)}</li>`).join('');
    return `
      <section class="cta-section" data-section="cta_form" data-section-label="Form Contatti"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="cta-card">
            <div class="cta-text">
              <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
              <p>${esc(s.body||'')}</p>
              <ul class="cta-perks">${perks}</ul>
            </div>
            <div class="form-wrap">
              <h3>${esc(s.form_title||'Prenota')}</h3>
              <p class="form-sub">${esc(s.form_subtitle||'')}</p>
              <p style="color:#888;font-style:italic;font-size:.85rem;text-align:center;margin-top:30px">[ qui appaiono i campi del form sulla landing ]</p>
            </div>
          </div>
        </div>
      </section>`;
  }
};

function renderNav(data){
  const nav = data.nav||{};
  const links = (nav.links||[]).map(l=>`<li><a href="${esc(l.href||'#')}">${esc(l.label||'')}</a></li>`).join('');
  return `
    <div class="container nav-inner">
      <a href="#" class="logo">
        <span class="logo-mark">DC</span>
        <span>${esc(data.site?.logo_text||'Dr. Campa')}</span>
      </a>
      <ul class="nav-links">${links}</ul>
      <div class="nav-cta">
        ${nav.phone_label?`<a href="#" class="login">${esc(nav.phone_label)}</a>`:''}
        ${nav.cta_label?`<a href="#" class="btn btn-primary">${esc(nav.cta_label)}</a>`:''}
      </div>
    </div>`;
}

function renderFooter(data){
  const f = data.footer||{};
  const cols = (f.columns||[]).map(c=>{
    const links = (c.links||[]).map(l=>`<li><a href="#">${esc(l.label||'')}</a></li>`).join('');
    return `<div><h5>${esc(c.title||'')}</h5><ul>${links}</ul></div>`;
  }).join('');
  return `
    <div class="container">
      <div class="footer-top">
        <div class="footer-about">
          <a href="#" class="logo">
            <span class="logo-mark">DC</span>
            <span>${esc(data.site?.logo_text||'')}</span>
          </a>
          <p>${esc(f.about_text||'')}</p>
        </div>
        ${cols}
      </div>
      <div class="footer-bottom">
        <div>${esc(f.bottom_left||'')}</div>
      </div>
    </div>`;
}

const PREVIEW_EXTRA_CSS = `
  <style>
    [data-section]{
      position:relative;
    }
    [data-section]:hover{
      outline:2px dashed rgba(232,93,60,.5);
      outline-offset:-2px;
    }
    [data-section]::before{
      content:"📍 " attr(data-section-label);
      position:absolute;
      top:12px; left:12px;
      z-index:50;
      background:#0a0a0a;
      color:#fff;
      padding:6px 12px;
      border-radius:999px;
      font:600 11px/1 "Inter", system-ui, sans-serif;
      letter-spacing:.02em;
      opacity:0;
      transition:opacity .15s;
      pointer-events:none;
      box-shadow:0 6px 18px -4px rgba(0,0,0,.4);
    }
    [data-section]:hover::before{
      opacity:1;
    }
  </style>
`;

function renderFullSite(data){
  let html = colorOverrideCss(data.site?.colors);
  html += PREVIEW_EXTRA_CSS;
  html += '<nav class="nav">' + renderNav(data) + '</nav>';
  html += '<main>';
  (data.sections||[]).forEach(s => {
    const tpl = templates[s.type];
    if(tpl){
      try { html += tpl(s); }
      catch(e){ html += '<div style="padding:20px;background:#ffe;color:#a60;border:1px solid #fc6;margin:10px">Errore "' + esc(s.type) + '": ' + esc(e.message) + '</div>'; }
    } else {
      html += '<div style="padding:20px;background:#ffe;color:#a60;border:1px solid #fc6;margin:10px">Tipo sconosciuto: "' + esc(s.type) + '"</div>';
    }
  });
  html += '</main>';
  html += '<footer class="footer">' + renderFooter(data) + '</footer>';
  return html;
}

const SitePreview = function(props){
  let data;
  try { data = props.entry.getIn(['data']).toJS(); }
  catch(e){ return h('div', {style:{padding:'40px'}}, 'Errore: ' + e.message); }
  return h('div', {dangerouslySetInnerHTML: {__html: renderFullSite(data)}});
};

CMS.registerPreviewStyle('/admin/preview.css');
CMS.registerPreviewTemplate('main', SitePreview);


/* ==========================================================
   ⭐ TAGGER: aggiunge data-section-type=hero/problem/...
   ai list items, in base al testo del label.
   ========================================================== */
const TYPE_MAP = {
  'Hero': 'hero',
  'Problema': 'problem',
  'Chi è il dottore': 'about',
  'About': 'about',
  'Card valore': 'value_card',
  'Card Valore': 'value_card',
  'Metodo': 'method',
  'Piramide': 'levels',
  'Programmi': 'programs',
  'Audience': 'audience',
  'Statistiche': 'stats',
  'Testimonianze': 'testimonials',
  'Grande citazione': 'big_quote',
  'Caratteristiche': 'features_card',
  'Form Contatti': 'cta_form',
  'Form di Contatto': 'cta_form'
};

function tagSectionTypes(){
  const items = document.querySelectorAll('[class*="StyledListItem"], [class*="ListItem-"], [data-rbd-draggable-id]');
  items.forEach(item => {
    if(item.dataset.sectionType) return;
    // Cerco il label nella top bar dell'item
    const topBar = item.querySelector(':scope > [class*="StyledListItemTopBar"], :scope > [class*="ListItemTopBar"], :scope > div > [class*="StyledListItemTopBar"]');
    if(!topBar) return;
    const labelEl = topBar.querySelector('label, [class*="StyledLabel"]');
    if(!labelEl) return;
    const text = (labelEl.textContent || '').trim();
    for(const [key, type] of Object.entries(TYPE_MAP)){
      if(text.indexOf(key) >= 0){
        item.setAttribute('data-section-type', type);
        return;
      }
    }
  });
}

// Run periodically — Decap re-renders list often
setInterval(tagSectionTypes, 1200);
// Also run on initial DOM mutations
const observer = new MutationObserver(() => tagSectionTypes());
observer.observe(document.body, {childList: true, subtree: true});
</script>
