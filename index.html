<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caricamento...</title>
<meta name="description" content="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400;1,9..40,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
:root{
  --white:#fff; --bg-soft:#faf7f3; --bg-warm:#f4ede3;
  --ink:#0a0a0a; --ink-soft:#4a4948; --ink-light:#8a8786;
  --line:#ebe5dc;
  --coral-1:#ff8a5c; --coral-2:#ff6952; --coral-deep:#e85d3c; --coral-darker:#c44a2e;
  --yellow:#ffd43b; --gold-soft:#fdf5d4;
  --font-sans:"DM Sans",system-ui,-apple-system,sans-serif;
  --font-serif:"Instrument Serif",Georgia,serif;
  --maxw:1200px; --gutter:clamp(20px,4vw,56px);
  --radius:24px; --radius-sm:14px;
  --transition:320ms cubic-bezier(.22,.61,.36,1);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);font-weight:400;font-size:17px;line-height:1.55;color:var(--ink);background:var(--white);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
img,video{max-width:100%;display:block;height:auto}
a{color:inherit;text-decoration:none;transition:color var(--transition)}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
h1,h2,h3,h4{font-family:var(--font-sans);font-weight:600;line-height:1.08;letter-spacing:-.02em;margin:0;color:var(--ink)}
h1{font-size:clamp(2.6rem,6.5vw,5.2rem);font-weight:700}
h2{font-size:clamp(2.1rem,4.6vw,3.6rem);font-weight:700}
h3{font-size:clamp(1.4rem,2.2vw,1.9rem)}
h4{font-size:1.1rem;font-weight:600}
.serif-italic{font-family:var(--font-serif);font-style:italic;font-weight:400;letter-spacing:-.01em}
.container{max-width:var(--maxw);margin:0 auto;padding:0 var(--gutter)}
section{padding:clamp(70px,9vw,130px) 0;position:relative}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;padding:14px 26px;font-family:var(--font-sans);font-size:.95rem;font-weight:600;border-radius:999px;transition:all var(--transition);cursor:pointer;white-space:nowrap;border:0}
.btn-primary{background:var(--coral-deep);color:var(--white)}
.btn-primary:hover{background:var(--coral-darker);transform:translateY(-2px);box-shadow:0 12px 24px -8px rgba(232,93,60,.4)}
.btn-yellow{background:var(--yellow);color:var(--ink)}
.btn-yellow:hover{background:#ffcc00;transform:translateY(-2px);box-shadow:0 12px 24px -8px rgba(255,212,59,.5)}
.btn-large{padding:18px 34px;font-size:1rem}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all var(--transition)}
.nav.scrolled{padding:12px 0;box-shadow:0 1px 0 var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.15rem;letter-spacing:-.02em}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--coral-1),var(--coral-deep));display:grid;place-items:center;color:var(--white);font-weight:700;font-size:.9rem}
.nav-links{display:flex;gap:32px;list-style:none;margin:0;padding:0}
.nav-links a{font-size:.92rem;font-weight:500}
.nav-links a:hover{color:var(--coral-deep)}
.nav-cta{display:flex;align-items:center;gap:14px}
.nav-cta .login{font-size:.92rem;font-weight:500}
.nav-cta .login:hover{color:var(--coral-deep)}
.mobile-toggle{display:none;flex-direction:column;gap:5px;padding:8px}
.mobile-toggle span{width:22px;height:1.5px;background:var(--ink);transition:all var(--transition)}
@media (max-width:900px){
  .nav-links,.nav-cta .login{display:none}
  .mobile-toggle{display:flex}
  .nav.open .mobile-toggle span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  .nav.open .mobile-toggle span:nth-child(2){opacity:0}
  .nav.open .mobile-toggle span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
  .nav.open .nav-links{display:flex;position:absolute;top:100%;left:0;right:0;flex-direction:column;gap:0;background:var(--white);border-top:1px solid var(--line);padding:18px var(--gutter)}
  .nav.open .nav-links li{padding:14px 0;border-bottom:1px solid var(--line)}
  .nav.open .nav-links li:last-child{border:0}
}

/* HERO */
.hero{position:relative;min-height:88vh;padding-top:120px;padding-bottom:60px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;color:var(--white);text-align:center}
.hero-bg{position:absolute;inset:0;z-index:0;background:#1a1614}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.55}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35) 0%,rgba(0,0,0,.5) 100%)}
.hero-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-sans);font-weight:800;font-size:clamp(8rem,18vw,18rem);color:rgba(255,255,255,.04);letter-spacing:-.04em;white-space:nowrap;pointer-events:none;z-index:1}
.hero-content{position:relative;z-index:2}
.hero h1{color:var(--white);font-size:clamp(2.4rem,6.2vw,5rem);max-width:980px;margin:0 auto 26px;line-height:1.05}
.hero h1 .accent{color:var(--yellow);position:relative;display:inline-block}
.hero h1 .accent::after{content:"";position:absolute;left:-2%;right:-2%;bottom:-6px;height:14px;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 14' preserveAspectRatio='none'><path d='M2,8 Q40,2 80,7 T160,7 T240,7 T298,6' stroke='%23ffd43b' stroke-width='3' fill='none' stroke-linecap='round'/></svg>") center/100% 100% no-repeat}
.hero-sub{max-width:680px;margin:0 auto 36px;font-size:clamp(1rem,1.4vw,1.18rem);line-height:1.55;color:rgba(255,255,255,.92)}
.hero-sub .em{font-family:var(--font-serif);font-style:italic;font-size:1.1em}
.hero-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.mission-card{margin-top:60px;background:var(--white);color:var(--ink);border-radius:20px;padding:28px 32px;max-width:780px;margin-left:auto;margin-right:auto;box-shadow:0 30px 60px -20px rgba(0,0,0,.3)}
.mission-label{font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px}
.mission-label strong{color:var(--ink)}
.mission-bar{height:14px;border-radius:999px;background:var(--bg-warm);overflow:hidden;position:relative;margin-bottom:14px}
.mission-bar-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--coral-1));border-radius:999px}
.mission-bar-pct{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:.72rem;font-weight:700;color:var(--ink)}
.mission-figure{font-size:clamp(1.4rem,2.4vw,2rem);font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.mission-sub{font-size:.95rem;color:var(--ink-soft)}
.mission-sub .hl{color:var(--coral-deep);font-weight:600}

/* PROBLEM */
.problem{position:relative;background:var(--bg-soft);text-align:left;overflow:hidden}
.problem-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:800;font-size:clamp(8rem,18vw,16rem);color:rgba(232,93,60,.04);letter-spacing:-.04em;white-space:nowrap;pointer-events:none;z-index:0}
.problem .container{position:relative;z-index:1}
.problem h2{text-align:center;max-width:840px;margin:0 auto 50px}
.problem h2 .accent{color:var(--coral-deep)}
.problem-body{max-width:680px;margin:0 auto;font-size:1.05rem;color:var(--ink-soft)}
.problem-body p{margin:0 0 1.2em}
.problem-body p strong{color:var(--ink);font-weight:600}
.problem-quote{border-left:3px solid var(--coral-deep);padding:18px 26px;margin:2em 0;background:transparent}
.problem-quote p{margin:0 0 .5em;color:var(--ink);font-weight:500}
.problem-quote p:last-child{margin:0}
.problem-final{color:var(--coral-deep);font-weight:600;text-align:center;margin-top:40px;font-size:1.05rem}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr;gap:50px;max-width:780px;margin:0 auto;text-align:center}
.about h2{margin-bottom:24px}
.about-lead{font-size:1.1rem;color:var(--ink-soft);max-width:620px;margin:0 auto 40px}
.about-photo{position:relative;max-width:680px;margin:0 auto 40px;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/10;background:var(--bg-warm)}
.about-photo img{width:100%;height:100%;object-fit:cover}
.about-body{text-align:left;font-size:1.02rem;color:var(--ink-soft);max-width:620px;margin:0 auto}
.about-body p{margin:0 0 1.2em}
.about-body strong{color:var(--ink);font-weight:600}
.about-body .callout{display:block;font-style:normal;font-weight:600;color:var(--ink);border-left:3px solid var(--coral-deep);padding:14px 22px;margin:1.5em 0}

/* VALUE CARD */
.value-section{padding:clamp(50px,7vw,100px) 0;background:var(--white)}
.value-card{background:linear-gradient(135deg,var(--coral-1) 0%,var(--coral-deep) 100%);border-radius:var(--radius);padding:clamp(40px,6vw,80px) clamp(28px,4vw,60px);color:var(--white);text-align:center;box-shadow:0 30px 60px -25px rgba(232,93,60,.4)}
.value-card h2{color:var(--white);margin-bottom:22px;max-width:760px;margin-left:auto;margin-right:auto}
.value-card .lead{font-size:1.05rem;max-width:680px;margin:0 auto 50px;opacity:.95;line-height:1.6}
.value-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.value-item{background:var(--white);color:var(--ink);border-radius:16px;padding:32px 26px;text-align:center}
.value-icon{width:56px;height:56px;margin:0 auto 22px;display:grid;place-items:center}
.value-icon svg{width:100%;height:100%;color:var(--coral-deep)}
.value-item h4{font-size:1.05rem;font-weight:700;margin-bottom:18px;line-height:1.3}
.value-tag{display:inline-block;padding:6px 14px;background:var(--bg-warm);border-radius:999px;font-size:.78rem;font-weight:600;color:var(--ink)}
.value-footnote{margin-top:50px;max-width:760px;margin-left:auto;margin-right:auto;font-size:1rem;opacity:.95;line-height:1.55}
@media (max-width:800px){.value-grid{grid-template-columns:1fr;gap:14px}}

/* METHOD */
.method{background:var(--bg-soft)}
.method-head{text-align:center;max-width:780px;margin:0 auto 60px}
.method-head h2{margin-bottom:16px}
.method-head h2 .accent{color:var(--coral-deep)}
.method-head .sub{font-size:1.05rem;color:var(--ink-soft)}
.method-head .sub strong{color:var(--ink);font-weight:600;display:block;margin-top:14px}
.method-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.method-card{background:var(--white);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.method-photo{position:relative;aspect-ratio:1.3/1;overflow:hidden;background:var(--bg-warm)}
.method-photo img{width:100%;height:100%;object-fit:cover}
.method-num{position:absolute;top:24px;left:30px;font-size:3.2rem;font-weight:800;color:rgba(255,255,255,.7);line-height:1}
.method-body{padding:32px 30px 36px}
.method-body h3{margin-bottom:14px}
.method-body p{margin:0;color:var(--ink-soft);font-size:.98rem}
@media (max-width:800px){.method-grid{grid-template-columns:1fr}}

/* LEVELS */
.levels{background:var(--white);overflow:hidden}
.levels-head{text-align:center;margin-bottom:60px;max-width:760px;margin-left:auto;margin-right:auto}
.levels-head h2{margin-bottom:16px}
.levels-head h2 .accent{color:var(--coral-deep)}
.levels-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:60px;align-items:center}
.pyramid{position:relative;aspect-ratio:1/.95;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;background:radial-gradient(ellipse at center,rgba(255,212,59,.15),transparent 70%)}
.tri{width:0;height:0;position:relative;display:grid;place-items:center;color:var(--ink);font-weight:700;font-size:.92rem;text-align:center}
.tri-1{border-left:170px solid transparent;border-right:170px solid transparent;border-bottom:120px solid #b6e93a}
.tri-2{border-left:120px solid transparent;border-right:120px solid transparent;border-bottom:90px solid #93cf2e}
.tri-3{border-left:75px solid transparent;border-right:75px solid transparent;border-bottom:60px solid #d6e94a}
.tri-label{position:absolute;width:200px;font-size:.9rem;color:var(--ink);font-weight:600;line-height:1.2}
.tri-1 .tri-label{bottom:-90px}
.tri-2 .tri-label{bottom:-70px;width:170px}
.tri-3 .tri-label{bottom:-50px;width:130px;font-size:.82rem}
.levels-list{display:flex;flex-direction:column;gap:28px}
.level{padding:22px 0;border-bottom:1px solid var(--line)}
.level:last-child{border:0}
.level-tag{font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--coral-deep);margin-bottom:6px}
.level h4{margin-bottom:8px;font-size:1.2rem}
.level p{margin:0;color:var(--ink-soft);font-size:.98rem}
@media (max-width:900px){.levels-grid{grid-template-columns:1fr;gap:80px}.pyramid{order:-1;max-width:380px;margin:0 auto}}

/* PROGRAMS */
.programs{background:var(--bg-soft)}
.programs-head{text-align:center;margin-bottom:50px}
.programs-head h2{margin-bottom:14px}
.programs-head h2 .accent{color:var(--coral-deep)}
.programs-head .sub{font-size:1.05rem;color:var(--ink-soft)}
.program-card{background:var(--white);border-radius:var(--radius);padding:clamp(36px,5vw,60px);display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center;margin-bottom:24px;overflow:hidden}
.program-card.reverse .program-text{order:2}
.program-tag{font-family:var(--font-serif);font-style:italic;color:var(--coral-deep);font-size:1.15rem;margin-bottom:10px}
.program-card h3{font-size:clamp(1.8rem,2.8vw,2.4rem);margin-bottom:14px}
.program-subtitle{font-weight:700;font-size:1.05rem;margin-bottom:18px}
.program-card p{color:var(--ink-soft);margin:0 0 1em;font-size:.98rem}
.program-link{color:var(--coral-deep);font-weight:600;text-decoration:underline;text-underline-offset:4px;font-size:.98rem;display:inline-block;margin-top:8px}
.program-img{aspect-ratio:1.2/1;border-radius:16px;overflow:hidden;background:var(--bg-warm)}
.program-img img{width:100%;height:100%;object-fit:cover}
@media (max-width:800px){.program-card{grid-template-columns:1fr;gap:30px}.program-card.reverse .program-text{order:1}}

/* AUDIENCE */
.audience-head{text-align:center;margin:0 auto 50px;max-width:780px}
.audience-head h2{margin-bottom:16px}
.audience-head h2 .accent{color:var(--coral-deep)}
.audience-head .sub{color:var(--ink-soft);font-size:1.05rem}
.audience-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.audience-item{display:flex;flex-direction:column;gap:18px}
.audience-photo{aspect-ratio:1/1;border-radius:18px;overflow:hidden;background:var(--bg-warm)}
.audience-photo img{width:100%;height:100%;object-fit:cover;transition:transform 800ms}
.audience-item:hover .audience-photo img{transform:scale(1.04)}
.audience-item h4{font-size:1.3rem;margin-bottom:2px}
.audience-item p{margin:0;color:var(--ink-soft);font-size:.95rem}
.audience-item p strong{color:var(--ink);font-weight:600}
@media (max-width:800px){.audience-grid{grid-template-columns:1fr;gap:22px}}

/* STATS */
.stats{background:var(--white);text-align:center}
.stats-head h2{margin-bottom:14px}
.stats-head h2 .accent{color:var(--coral-deep)}
.stats-head .sub{max-width:680px;margin:0 auto 60px;color:var(--ink-soft);font-size:1.05rem;line-height:1.55}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:50px;margin-bottom:60px}
.stats-row:last-of-type{margin-bottom:0}
.stat .pill{display:inline-block;padding:6px 14px;font-size:.78rem;font-weight:600;background:var(--bg-warm);border-radius:999px;color:var(--ink);margin-bottom:14px;border:1px solid var(--line)}
.stat .num{font-size:clamp(3rem,6vw,5rem);font-weight:700;line-height:1;color:var(--coral-deep);letter-spacing:-.03em}
.stat .lbl{margin-top:14px;font-size:.95rem;color:var(--ink-soft);line-height:1.4}
.stats-foot{margin-top:40px;font-size:.85rem;color:var(--ink-light);font-style:italic}
@media (max-width:800px){.stats-row{grid-template-columns:1fr 1fr;gap:30px 20px}.stats-row .stat:last-child{grid-column:1/-1}}

/* TESTIMONIALS */
.testimonials{background:var(--bg-soft)}
.test-head{text-align:center;margin-bottom:50px}
.test-head h2{margin-bottom:14px}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.test-card{background:var(--white);border-radius:18px;padding:30px 28px;display:flex;flex-direction:column;gap:16px}
.test-stars{color:#ffb800;letter-spacing:1px;font-size:1rem}
.test-text{font-size:.98rem;color:var(--ink-soft);line-height:1.55;margin:0}
.test-text strong{color:var(--ink);font-weight:600}
.test-author{display:flex;align-items:center;gap:12px;margin-top:auto}
.test-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg-warm);overflow:hidden;flex-shrink:0}
.test-avatar img{width:100%;height:100%;object-fit:cover}
.test-name{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:6px}
.verified{display:inline-grid;place-items:center;width:18px;height:18px;background:#1e9bf0;color:var(--white);border-radius:50%;font-size:.6rem;font-weight:700}
@media (max-width:900px){.test-grid{grid-template-columns:1fr 1fr;gap:18px}}
@media (max-width:600px){.test-grid{grid-template-columns:1fr}}

/* BIG QUOTE */
.big-quote{background:var(--ink);color:var(--white);padding:clamp(70px,9vw,120px) 0;text-align:center}
.big-quote .q{font-size:clamp(1.4rem,2.8vw,2.2rem);line-height:1.4;max-width:920px;margin:0 auto 40px;font-weight:500;letter-spacing:-.01em}
.big-quote .who{display:flex;flex-direction:column;align-items:center;gap:10px}
.big-quote .who .av{width:60px;height:60px;border-radius:50%;background:var(--bg-warm);overflow:hidden}
.big-quote .who .av img{width:100%;height:100%;object-fit:cover}
.big-quote .who .n{font-size:.95rem;color:rgba(255,255,255,.85)}

/* FEATURES CARD */
.features-section{padding:clamp(50px,7vw,100px) 0;background:var(--white)}
.features-card{background:linear-gradient(135deg,var(--coral-1) 0%,var(--coral-deep) 100%);border-radius:var(--radius);padding:clamp(40px,6vw,70px) clamp(28px,4vw,60px);color:var(--white);text-align:center}
.features-card h2{color:var(--white);margin-bottom:18px;max-width:820px;margin-left:auto;margin-right:auto}
.features-card .lead{max-width:580px;margin:0 auto 44px;opacity:.95;line-height:1.5}
.feature-pills{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.pill-item{background:var(--white);color:var(--ink);padding:18px 22px;border-radius:14px;font-size:.95rem;font-weight:600;text-align:left;display:flex;align-items:center;gap:12px}
.pill-item::before{content:"";flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--ink) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3'><polyline points='20 6 9 17 4 12'/></svg>") center/13px no-repeat}
.pill-item.special{background:var(--gold-soft);color:var(--ink)}
.pill-item.special::before{background-color:var(--coral-deep)}
.pill-item.special em{font-family:var(--font-serif);font-style:italic;color:var(--coral-deep)}
@media (max-width:900px){.feature-pills{grid-template-columns:1fr 1fr}}
@media (max-width:500px){.feature-pills{grid-template-columns:1fr}}

/* CTA */
.cta-section{background:var(--white);padding:clamp(70px,9vw,120px) 0}
.cta-card{background:linear-gradient(180deg,var(--bg-warm),var(--bg-soft));border-radius:var(--radius);padding:clamp(40px,6vw,70px) clamp(28px,4vw,60px);display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center}
.cta-text h2{margin-bottom:18px}
.cta-text h2 .accent{color:var(--coral-deep)}
.cta-text p{color:var(--ink-soft);font-size:1.05rem;margin:0 0 24px}
.cta-perks{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px}
.cta-perks li{display:flex;gap:12px;align-items:start;font-size:.95rem;color:var(--ink)}
.cta-perks li::before{content:"";flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--coral-deep) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3'><polyline points='20 6 9 17 4 12'/></svg>") center/13px no-repeat;margin-top:1px}
.form-wrap{background:var(--white);border-radius:18px;padding:32px 30px}
.form-wrap h3{margin-bottom:6px;font-size:1.35rem}
.form-sub{font-size:.92rem;color:var(--ink-soft);margin:0 0 22px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}
.field input,.field select,.field textarea{font-family:var(--font-sans);font-size:.98rem;padding:13px 14px;border:1px solid var(--line);background:var(--bg-soft);color:var(--ink);border-radius:10px;transition:all var(--transition);width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:0;border-color:var(--coral-deep);background:var(--white)}
.field textarea{resize:vertical;min-height:80px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.consent{font-size:.78rem;color:var(--ink-soft);display:flex;gap:8px;align-items:start;margin:14px 0 18px;line-height:1.4}
.consent input{margin-top:3px;flex-shrink:0}
.consent a{color:var(--coral-deep);text-decoration:underline}
.form-wrap .btn-primary{width:100%;padding:16px}
.form-success{display:none;padding:30px 24px;text-align:center;border:1px solid var(--coral-deep);border-radius:14px;background:rgba(232,93,60,.05)}
.form-success.active{display:block}
.form-success h4{font-size:1.3rem;color:var(--coral-deep);margin-bottom:8px}
.form-success p{margin:0;font-size:.95rem;color:var(--ink-soft)}
@media (max-width:900px){.cta-card{grid-template-columns:1fr;gap:32px}}
@media (max-width:500px){.field-row{grid-template-columns:1fr}}

/* FOOTER */
.footer{background:var(--ink);color:rgba(255,255,255,.7);padding:60px 0 28px}
.footer-top{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.1)}
.footer .logo{color:var(--white)}
.footer-about p{font-size:.92rem;max-width:340px;margin-top:16px}
.footer h5{font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--white);margin:0 0 16px}
.footer ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.footer a{font-size:.92rem}
.footer a:hover{color:var(--coral-1)}
.footer-bottom{padding-top:22px;display:flex;justify-content:space-between;gap:14px;font-size:.78rem;flex-wrap:wrap}
@media (max-width:800px){.footer-top{grid-template-columns:1fr 1fr}.footer-about{grid-column:1/-1}}

/* REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity 700ms,transform 700ms cubic-bezier(.22,.61,.36,1)}
.reveal.in{opacity:1;transform:translateY(0)}

/* LOADING */
.app-loading{min-height:100vh;display:grid;place-items:center;color:var(--ink-soft);font-size:.95rem}
.app-loading::before{content:"";width:32px;height:32px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--coral-deep);animation:spin 800ms linear infinite;margin-right:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-error{padding:40px;max-width:600px;margin:80px auto;background:var(--bg-soft);border-radius:16px;color:var(--ink)}
.load-error h2{margin-bottom:12px}
.load-error code{background:var(--white);padding:2px 8px;border-radius:4px;font-size:.9em}
</style>
</head>
<body>

<div id="app" class="app-loading">Caricamento sito...</div>

<script>
/* ==========================================================
   Helper: minimal HTML escape — used everywhere we render
   user-editable text inside ATTRIBUTES (e.g. alt="...").
   Plain TEXT content from CMS is wrapped in tags and treated
   as HTML (we want strong/em in body paragraphs).
   ========================================================== */
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function img(src, alt, cls){
  if(!src) return '';
  return `<img src="${esc(src)}" alt="${esc(alt||'')}"${cls?` class="${cls}"`:''}>`;
}

/* ==========================================================
   SECTION TEMPLATES
   Each function receives the section's data object and
   returns an HTML string.
   ========================================================== */
const templates = {

  hero(s){
    return `
      <section class="hero"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="hero-bg">${img(s.bg_image, 'Hero')}</div>
        ${s.watermark?`<div class="hero-watermark">${esc(s.watermark)}</div>`:''}
        <div class="container hero-content reveal">
          <h1>
            ${s.headline_pre?`${esc(s.headline_pre)}<br>`:''}
            ${s.headline_main?`${esc(s.headline_main)} `:''}
            ${s.headline_accent?`<span class="accent">${esc(s.headline_accent)}</span>`:''}
          </h1>
          <p class="hero-sub">
            ${s.subtitle_em?`<span class="em">${esc(s.subtitle_em)}</span> `:''}
            ${s.subtitle?esc(s.subtitle):''}
          </p>
          ${s.cta_label?`
            <div class="hero-cta">
              <a href="${esc(s.cta_href||'#contatti')}" class="btn btn-yellow btn-large">${esc(s.cta_label)}</a>
            </div>`:''}
          ${(s.mission_label_strong||s.mission_figure)?`
            <div class="mission-card">
              <div class="mission-label"><strong>${esc(s.mission_label_strong||'')}</strong> ${esc(s.mission_label_text||'')}</div>
              <div class="mission-bar">
                <div class="mission-bar-fill" style="width:${Number(s.mission_percent)||0}%"></div>
                <div class="mission-bar-pct">${Number(s.mission_percent)||0}%</div>
              </div>
              <div class="mission-figure">${esc(s.mission_figure||'')}</div>
              <div class="mission-sub">${esc(s.mission_sub_a||'')} <span class="hl">${esc(s.mission_sub_b||'')}</span></div>
            </div>`:''}
        </div>
      </section>`;
  },

  problem(s){
    const intro = (s.intro_paragraphs||[]).map(p=>`<p>${esc(p)}</p>`).join('');
    const questions = (s.questions||[]).map(q=>`<strong>${esc(q)}</strong>`).join('<br>');
    const middle = (s.middle_paragraphs||[]).map(p=>`<p>${esc(p)}</p>`).join('');
    const quote = (s.quote_lines||[]).map(l=>`<p>${esc(l)}</p>`).join('');
    return `
      <section class="problem"${s.id?` id="${esc(s.id)}"`:''}>
        ${s.watermark?`<div class="problem-watermark">${esc(s.watermark)}</div>`:''}
        <div class="container">
          <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
          <div class="problem-body">
            ${intro}
            ${questions?`<p>${questions}</p>`:''}
            ${middle}
            ${quote?`<div class="problem-quote">${quote}</div>`:''}
            ${s.final_line?`<p class="problem-final">${esc(s.final_line)}</p>`:''}
          </div>
        </div>
      </section>`;
  },

  about(s){
    const body = (s.body_paragraphs||[]).map(p=>`<p>${p}</p>`).join('');
    return `
      <section class="about"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container about-grid">
          <div>
            <h2>${esc(s.title||'')}</h2>
            ${s.lead?`<p class="about-lead">${esc(s.lead)}</p>`:''}
          </div>
          ${s.photo?`<div class="about-photo">${img(s.photo,'Dr. Campa')}</div>`:''}
          <div class="about-body">
            ${body}
            ${s.callout?`<em class="callout">${esc(s.callout)}</em>`:''}
          </div>
        </div>
      </section>`;
  },

  value_card(s){
    const icons = {
      clock:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="20"/><path d="M32 18v14l8 4"/></svg>`,
      chart:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 50 L24 30 L36 38 L52 14"/><polyline points="40 14 52 14 52 26"/></svg>`,
      shield:`<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M32 8 L52 16 V32 C52 44 32 56 32 56 C32 56 12 44 12 32 V16 Z"/><polygon points="32 22 35 28 41 29 36 33 37 39 32 36 27 39 28 33 23 29 29 28"/></svg>`
    };
    const items = (s.items||[]).map(it=>`
      <div class="value-item">
        <div class="value-icon">${icons[it.icon]||icons.clock}</div>
        <h4>${esc(it.title||'')}</h4>
        ${it.tag?`<span class="value-tag">${esc(it.tag)}</span>`:''}
      </div>`).join('');
    return `
      <section class="value-section"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="value-card reveal">
            <h2>${esc(s.title||'')}</h2>
            <p class="lead">${esc(s.lead||'')} <strong>${esc(s.lead_strong||'')}</strong></p>
            <div class="value-grid">${items}</div>
            ${s.footnote?`<p class="value-footnote">${esc(s.footnote)} <strong>${esc(s.footnote_strong||'')}</strong></p>`:''}
          </div>
        </div>
      </section>`;
  },

  method(s){
    const cards = (s.cards||[]).map(c=>`
      <div class="method-card">
        <div class="method-photo">
          ${img(c.photo, c.title)}
          <div class="method-num">${esc(c.num||'')}</div>
        </div>
        <div class="method-body">
          <h3>${esc(c.title||'')}</h3>
          <p>${esc(c.body||'')}</p>
        </div>
      </div>`).join('');
    return `
      <section class="method"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="method-head reveal">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">
              ${esc(s.subtitle_a||'')}<br><br>
              ${esc(s.subtitle_b||'')}
              <strong>${esc(s.subtitle_strong||'')}</strong>
            </p>
          </div>
          <div class="method-grid reveal">${cards}</div>
        </div>
      </section>`;
  },

  levels(s){
    const items = (s.levels||[]).map(l=>`
      <div class="level">
        <div class="level-tag">${esc(l.tag||'')}</div>
        <h4>${esc(l.title||'')}</h4>
        <p>${esc(l.body||'')}</p>
      </div>`).join('');
    const labels = s.pyramid_labels||[];
    return `
      <section class="levels"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="levels-head reveal">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          <div class="levels-grid">
            <div class="pyramid">
              <div class="tri tri-3"><span class="tri-label">${esc(labels[0]||'')}</span></div>
              <div class="tri tri-2"><span class="tri-label">${esc(labels[1]||'')}</span></div>
              <div class="tri tri-1"><span class="tri-label">${esc(labels[2]||'')}</span></div>
            </div>
            <div class="levels-list">${items}</div>
          </div>
          ${(s.footer_a||s.footer_strong)?`
            <p style="text-align:center;max-width:760px;margin:60px auto 0;color:var(--ink-soft);font-size:1rem">
              ${esc(s.footer_a||'')}<br><br>
              <strong>${esc(s.footer_strong||'')}</strong>
            </p>`:''}
        </div>
      </section>`;
  },

  programs(s){
    const cards = (s.cards||[]).map(c=>`
      <div class="program-card ${c.reverse?'reverse':''}">
        <div class="program-text">
          ${c.tag?`<div class="program-tag">${esc(c.tag)}</div>`:''}
          <h3>${esc(c.title||'')}</h3>
          ${c.subtitle?`<div class="program-subtitle">${esc(c.subtitle)}</div>`:''}
          <p>${esc(c.body||'')}</p>
          ${c.link_label?`<a href="${esc(c.link_href||'#')}" class="program-link">${esc(c.link_label)}</a>`:''}
        </div>
        <div class="program-img">${img(c.photo, c.title)}</div>
      </div>`).join('');
    return `
      <section class="programs"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="programs-head reveal">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          ${cards}
        </div>
      </section>`;
  },

  audience(s){
    const items = (s.items||[]).map(it=>`
      <div class="audience-item">
        <div class="audience-photo">${img(it.photo, it.title)}</div>
        <h4>${esc(it.title||'')}</h4>
        <p><strong>${esc(it.body_strong||'')}</strong> ${esc(it.body||'')}</p>
      </div>`).join('');
    return `
      <section${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="audience-head reveal">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          <div class="audience-grid">${items}</div>
        </div>
      </section>`;
  },

  stats(s){
    const renderRow = (row, isFirst)=>{
      if(!row||!row.length) return '';
      const cells = row.map(c=>`
        <div class="stat">
          ${c.pill?`<div class="pill">${esc(c.pill)}</div>`:''}
          <div class="num">${esc(c.num||'')}</div>
          <div class="lbl">${esc(c.label||'')}</div>
        </div>`).join('');
      return `<div class="stats-row reveal"${isFirst?'':' style="margin-bottom:0"'}>${cells}</div>`;
    };
    return `
      <section class="stats"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="stats-head reveal">
            <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
            <p class="sub">${esc(s.subtitle||'')}</p>
          </div>
          ${renderRow(s.row_a, true)}
          ${renderRow(s.row_b, false)}
          ${s.footnote?`<p class="stats-foot">${esc(s.footnote)}</p>`:''}
        </div>
      </section>`;
  },

  testimonials(s){
    const items = (s.items||[]).map(t=>`
      <div class="test-card">
        <div class="test-stars">★★★★★</div>
        <p class="test-text"><strong>${esc(t.text_strong||'')}</strong> ${esc(t.text||'')}</p>
        <div class="test-author">
          <div class="test-avatar">${img(t.avatar, t.name)}</div>
          <div class="test-name">${esc(t.name||'')} <span class="verified">✓</span></div>
        </div>
      </div>`).join('');
    return `
      <section class="testimonials"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="test-head reveal">
            <h2>${esc(s.title_a||'')} <span class="serif-italic">${esc(s.title_italic||'')}</span></h2>
          </div>
          <div class="test-grid">${items}</div>
        </div>
      </section>`;
  },

  big_quote(s){
    return `
      <section class="big-quote"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <p class="q">${esc(s.quote||'')}</p>
          <div class="who">
            ${s.author_photo?`<div class="av">${img(s.author_photo, s.author_name)}</div>`:''}
            <div class="n">${esc(s.author_name||'')}</div>
          </div>
        </div>
      </section>`;
  },

  features_card(s){
    const pills = (s.pills||[]).map(p=>{
      if(p.special){
        const t = (p.text||'').split(/\b(VIVERE|VIVI)\b/i);
        if(t.length===3){
          return `<div class="pill-item special">${esc(t[0])}<em>${esc(t[1])}</em>${esc(t[2])}</div>`;
        }
        return `<div class="pill-item special">${esc(p.text||'')}</div>`;
      }
      return `<div class="pill-item">${esc(p.text||'')}</div>`;
    }).join('');
    return `
      <section class="features-section"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="features-card reveal">
            <h2>${esc(s.title||'')}</h2>
            <p class="lead">${esc(s.lead||'')}</p>
            <div class="feature-pills">${pills}</div>
          </div>
        </div>
      </section>`;
  },

  cta_form(s){
    const perks = (s.perks||[]).map(p=>`<li>${esc(p)}</li>`).join('');
    const treatments = (s.treatments||[]).map(t=>`<option>${esc(t)}</option>`).join('');
    return `
      <section class="cta-section"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="cta-card reveal">
            <div class="cta-text">
              <h2>${esc(s.title_a||'')} <span class="accent">${esc(s.title_accent||'')}</span></h2>
              <p>${esc(s.body||'')}</p>
              <ul class="cta-perks">${perks}</ul>
            </div>
            <div class="form-wrap">
              <h3>${esc(s.form_title||'Prenota')}</h3>
              <p class="form-sub">${esc(s.form_subtitle||'')}</p>
              <form id="leadForm" novalidate>
                <div class="field-row">
                  <div class="field"><label>Nome</label><input type="text" name="firstName" required></div>
                  <div class="field"><label>Cognome</label><input type="text" name="lastName" required></div>
                </div>
                <div class="field-row">
                  <div class="field"><label>Email</label><input type="email" name="email" required></div>
                  <div class="field"><label>Telefono</label><input type="tel" name="phone" required></div>
                </div>
                <div class="field">
                  <label>Cosa ti interessa</label>
                  <select name="treatment" required>
                    <option value="">Seleziona...</option>
                    ${treatments}
                  </select>
                </div>
                <div class="field">
                  <label>Messaggio (opzionale)</label>
                  <textarea name="message" placeholder="Raccontaci brevemente cosa ti porta qui..."></textarea>
                </div>
                <label class="consent">
                  <input type="checkbox" required>
                  <span>Ho letto e accetto l'<a href="#">informativa privacy</a> e acconsento al trattamento dei dati per essere ricontattato.</span>
                </label>
                <button type="submit" class="btn btn-primary">${esc(s.submit_label||'Invia')} →</button>
              </form>
              <div class="form-success" id="formSuccess">
                <h4>${esc(s.success_title||'Grazie!')}</h4>
                <p>${esc(s.success_body||'')}</p>
              </div>
            </div>
          </div>
        </div>
      </section>`;
  }
};


/* ==========================================================
   NAV + FOOTER renderers
   ========================================================== */
function renderNav(data){
  const nav = data.nav||{};
  const links = (nav.links||[]).map(l=>`<li><a href="${esc(l.href||'#')}">${esc(l.label||'')}</a></li>`).join('');
  return `
    <div class="container nav-inner">
      <a href="#top" class="logo">
        <span class="logo-mark">DC</span>
        <span>${esc(data.site?.logo_text||'Dr. Campa')}</span>
      </a>
      <ul class="nav-links">${links}</ul>
      <div class="nav-cta">
        ${nav.phone_label?`<a href="${esc(nav.phone_href||'#')}" class="login">${esc(nav.phone_label)}</a>`:''}
        ${nav.cta_label?`<a href="${esc(nav.cta_href||'#')}" class="btn btn-primary">${esc(nav.cta_label)}</a>`:''}
        <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>`;
}

function renderFooter(data){
  const f = data.footer||{};
  const cols = (f.columns||[]).map(c=>{
    const links = (c.links||[]).map(l=>`<li><a href="${esc(l.href||'#')}">${esc(l.label||'')}</a></li>`).join('');
    return `<div><h5>${esc(c.title||'')}</h5><ul>${links}</ul></div>`;
  }).join('');
  const bottomLinks = (f.bottom_links||[]).map((l,i)=>`${i>0?' · ':''}<a href="${esc(l.href||'#')}">${esc(l.label||'')}</a>`).join('');
  return `
    <div class="container">
      <div class="footer-top">
        <div class="footer-about">
          <a href="#top" class="logo">
            <span class="logo-mark">DC</span>
            <span>${esc(data.site?.logo_text||'')}</span>
          </a>
          <p>${esc(f.about_text||'')}</p>
        </div>
        ${cols}
      </div>
      <div class="footer-bottom">
        <div>${esc(f.bottom_left||'')}</div>
        <div>${bottomLinks}</div>
      </div>
    </div>`;
}


/* ==========================================================
   INIT
   ========================================================== */
async function init(){
  let data;
  try{
    // Cache-bust to always see latest content while CMS edits
    const res = await fetch('content.json?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    data = await res.json();
  } catch(err){
    document.getElementById('app').classList.remove('app-loading');
    document.getElementById('app').innerHTML = `
      <div class="load-error">
        <h2>Contenuto non caricato</h2>
        <p>Impossibile caricare <code>content.json</code>. Se stai aprendo questo file direttamente dal disco, il browser blocca la richiesta. Sul sito pubblicato (Netlify) funzionerà normalmente.</p>
        <p style="font-size:.85rem;opacity:.7;margin-top:14px">Errore tecnico: ${esc(err.message)}</p>
      </div>`;
    return;
  }

  // Document meta
  document.title = data.site?.title || 'Sito';
  const metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc && data.site?.meta_description) metaDesc.setAttribute('content', data.site.meta_description);

  // Build the page
  const app = document.getElementById('app');
  app.classList.remove('app-loading');
  app.innerHTML = '';

  // NAV
  const nav = document.createElement('nav');
  nav.className = 'nav';
  nav.id = 'nav';
  nav.innerHTML = renderNav(data);
  app.appendChild(nav);

  // MAIN
  const main = document.createElement('main');
  main.id = 'top';
  const sections = (data.sections||[]).map(s => {
    const tpl = templates[s.type];
    if(!tpl){ console.warn('Sezione di tipo sconosciuto:', s.type); return ''; }
    try{ return tpl(s); } catch(e){ console.error('Errore rendering sezione', s.type, e); return ''; }
  }).join('');
  main.innerHTML = sections;
  app.appendChild(main);

  // FOOTER
  const footer = document.createElement('footer');
  footer.className = 'footer';
  footer.innerHTML = renderFooter(data);
  app.appendChild(footer);

  // Behaviors
  initBehaviors();
}

function initBehaviors(){
  // Sticky nav
  const nav = document.getElementById('nav');
  if(nav){
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 30);
    }, {passive:true});
    const toggle = document.getElementById('mobileToggle');
    if(toggle) toggle.addEventListener('click', () => nav.classList.toggle('open'));
    nav.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => nav.classList.remove('open'));
    });
  }

  // Scroll reveal
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, {threshold:.12});
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // Form submit  -- HOOK FORM
  // Per collegare al CRM/email: sostituire il blocco SIMULAZIONE
  // qui sotto con una fetch() al vostro endpoint.
  const form = document.getElementById('leadForm');
  if(form){
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(form).entries());
      console.log('Lead ricevuto:', formData);
      await new Promise(r => setTimeout(r, 500));
      form.style.display = 'none';
      document.getElementById('formSuccess').classList.add('active');
    });
  }
}

init();
</script>
</body>
</html>
